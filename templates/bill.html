<!DOCTYPE html>
<html>
<head>
    <title>Bill</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container p-3">

<h3 class="mb-3">🧾 Table {{table_no}} Bill</h3>

<!-- SHOW BILL -->
<form method="POST" action="/calculate/{{table_no}}">

{% for order in orders %}
<div class="row mb-2">

    <div class="col-4">
        <input type="text" value="{{order.item}}" class="form-control" readonly>
    </div>

    <div class="col-2">
        <input type="text" value="{{order.qty}}" class="form-control" readonly>
    </div>

    <div class="col-3">
        <!-- 🔥 AUTO PRICE -->
        <input type="number" name="price" value="{{order.price}}" class="form-control" readonly>
    </div>

    <div class="col-3">
        <input type="number"
               value="{{order.qty * order.price}}"
               class="form-control"
               readonly>
    </div>

</div>
{% endfor %}

<button class="btn btn-primary w-100 mt-2">
    💰 Calculate Total
</button>

</form>

<hr>

{% if total is defined %}

<div class="card p-3 shadow-sm border-0 rounded-4">

    <p><b>Total:</b> ₹{{ total }}</p>
    <p><b>GST (18%):</b> ₹{{ gst }}</p>

    <h4 class="text-success">Final Amount: ₹{{ final }}</h4>

    <a href="/invoice/{{table_no}}" class="btn btn-dark w-100 mt-2">
        📄 Download Invoice
    </a>

    <button onclick="window.print()" class="btn btn-secondary w-100 mt-2">
        🖨 Print Bill
    </button>

    <a href="/payment_done/{{table_no}}" class="btn btn-success w-100 mt-2">
        ✅ Payment Done
    </a>

</div>

{% endif %}

<a href="/reception" class="btn btn-secondary w-100 mt-3">
    ⬅ Back
</a>

</div>

</body>
</html>
