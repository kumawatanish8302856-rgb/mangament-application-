<!DOCTYPE html>
<html>
<head>
    <title>Reception Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #e3e9f0);
            font-family: 'Segoe UI', sans-serif;
        }

        .header {
            font-weight: 700;
            color: #333;
        }

        .table-card {
            border: none;
            border-radius: 18px;
            transition: 0.3s;
            cursor: pointer;
            background: white;
        }

        .table-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .table-icon {
            font-size: 32px;
        }

        .top-bar {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .empty {
            text-align: center;
            margin-top: 60px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <!-- TOP BAR -->
    <div class="d-flex justify-content-between align-items-center mb-4 top-bar">
        <h4 class="header mb-0">💰 Reception Dashboard</h4>

        <a href="/" class="btn btn-outline-dark rounded-pill px-3">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <!-- TABLE GRID -->
    <div class="row g-4">

        {% if tables and tables|length > 0 %}

            {% for table, orders in tables.items() %}
            <div class="col-6 col-md-4 col-lg-3">

                <a href="/bill/{{table}}" style="text-decoration:none;">
                    <div class="card table-card p-4 text-center shadow-sm">

                        <div class="table-icon mb-2">🪑</div>

                        <h5 class="fw-bold mb-1">Table {{table}}</h5>

                        <small class="text-muted">
                            {{orders|length}} Ready Items
                        </small>

                    </div>
                </a>

            </div>
            {% endfor %}

        {% else %}

        <!-- EMPTY STATE -->
        <div class="empty">
            <i class="bi bi-emoji-frown" style="font-size:50px;"></i>
            <h5 class="mt-3">No Tables Ready</h5>
            <p>Waiting for kitchen to complete orders...</p>
        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
