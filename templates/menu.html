<!DOCTYPE html>
<html>
<head>
    <title>Menu Management</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ece9e6, #ffffff);
            font-family: Arial;
        }

        .box {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<div class="box">

    <h3 class="text-center mb-3">📋 Menu Management</h3>

    <!-- ADD MENU FORM (FLASK) -->
    <form method="POST" action="/add_menu">

        <input name="name" class="form-control mb-2" placeholder="Item Name" required>

        <input name="full" type="number" class="form-control mb-2" placeholder="Full Price" required>

        <input name="half" type="number" class="form-control mb-2" placeholder="Half Price" required>

        <button class="btn btn-success w-100">➕ Add Item</button>

    </form>

    <hr>

    <h5>📦 Menu List</h5>

    {% for item in items %}
    <div class="item">
        <div>
            <b>{{item.name}}</b><br>
            ₹{{item.full_price}} / ₹{{item.half_price}}
        </div>
    </div>
    {% endfor %}

    <a href="/" class="btn btn-secondary w-100 mt-3">⬅ Back</a>

</div>

</body>
</html>
